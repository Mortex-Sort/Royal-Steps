<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{background:#111;color:white;font-family:Arial;text-align:center}
input,select,button{padding:10px;margin:5px;border-radius:5px}
button{background:red;color:white;border:none;cursor:pointer}
.product{border:1px solid white;padding:10px;margin:10px;position:relative;}
</style>
</head>
<body>

<h1>Admin Panel</h1>

<h2>Add Product</h2>
<input id="name" placeholder="Product Name"><br>
<input id="actualPrice" placeholder="Actual Price"><br>
<input id="discountPrice" placeholder="Discount Price (optional)"><br>
<select id="category">
<option value="sneakers">Sneakers</option>
<option value="shoes">Shoes</option>
<option value="sports">Sports Shoes</option>
<option value="premium">Premium Shoes</option>
</select><br>
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select><br>
<input type="file" id="image"><br>
<button onclick="addProduct()">Add Product</button>

<hr>

<h2>Festival Offer</h2>
<input id="offerName" placeholder="Festival Name"><br>
<input id="offerPercent" placeholder="Discount %"><br>
<input id="minPrice" placeholder="Min Price"><br>
<input id="maxPrice" placeholder="Max Price"><br>
<label>Offer End Date & Time</label><br>
<input type="datetime-local" id="offerEnd"><br>
<button onclick="setOffer()">Activate Offer</button>
<button onclick="removeOffer()">Remove Offer</button>

<hr>

<h2>All Products</h2>
<div id="productList"></div>

<script>
// -------------------- CONFIG -------------------
const backendURL = "http://localhost:5000/add-product"; // Node.js backend endpoint
const fetchJSONURL = "http://localhost:5000/fetch-products"; // Optional: backend endpoint to fetch makhna.json

// -------------------- ADD PRODUCT -------------------
async function addProduct(){
  let name = document.getElementById("name").value;
  let actualPrice = document.getElementById("actualPrice").value;
  let discountPrice = document.getElementById("discountPrice").value;
  let category = document.getElementById("category").value;
  let rating = document.getElementById("rating").value;
  let file = document.getElementById("image").files[0];

  if(!name || !actualPrice || !file){
    alert("Fill all required fields");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("name", name);
  formData.append("actualPrice", actualPrice);
  formData.append("discountPrice", discountPrice);
  formData.append("category", category);
  formData.append("rating", rating);

  try{
    const res = await fetch(backendURL, { method:"POST", body: formData });
    const data = await res.json();
    alert(data.message);
    showProducts(); // refresh product list
  }catch(err){
    alert("Error adding product: "+err);
    console.error(err);
  }
}

// -------------------- SHOW PRODUCTS -------------------
async function showProducts(){
  try{
    const res = await fetch(fetchJSONURL);
    const products = await res.json();
    const box = document.getElementById("productList");
    box.innerHTML = "";
    products.forEach((p,i)=>{
      box.innerHTML += `
        <div class="product">
          <img src="${p.image}" width="80"><h3>${p.name}</h3>
          <p>Actual: ₹${p.actualPrice}</p>
          <p>Discount: ${p.discountPrice || 'None'}</p>
          <p>Category: ${p.category}</p>
          <p>Rating: ${'⭐'.repeat(p.rating)}</p>
          <button onclick="deleteProduct(${i})">Delete</button>
        </div>
      `;
    });
  }catch(err){
    console.error(err);
  }
}

// -------------------- DELETE PRODUCT -------------------
async function deleteProduct(i){
  try{
    const res = await fetch(`http://localhost:5000/delete-product/${i}`, {method:"POST"});
    const data = await res.json();
    alert(data.message);
    showProducts();
  }catch(err){ console.error(err); }
}

// -------------------- FESTIVAL OFFER -------------------
function setOffer(){
  let name = document.getElementById("offerName").value;
  let percent = Number(document.getElementById("offerPercent").value);
  let min = Number(document.getElementById("minPrice").value);
  let max = Number(document.getElementById("maxPrice").value);
  let endDate = document.getElementById("offerEnd").value;

  if(!name||!percent||!endDate){alert("Fill offer details"); return;}

  let offer = {name,name,percent,min,max,endTime:new Date(endDate).getTime()};
  localStorage.setItem("festivalOffer",JSON.stringify(offer));
  alert("Festival offer activated");
}

function removeOffer(){
  localStorage.removeItem("festivalOffer");
  alert("Offer removed");
}

// -------------------- INITIAL LOAD -------------------
showProducts();
</script>

</body>
</html>
